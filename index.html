<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section theme-toggle">
          <span class="label">TEMA</span>
          <label class="toggle-switch" title="Cambiar tema">
            <input type="checkbox" id="theme-toggle" checked />
            <span class="toggle-slider"></span>
            <span class="toggle-icon" id="theme-icon">🌙</span>
          </label>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2 class="overlay-title">PAUSA</h2>
        <button id="resume-btn" class="menu-btn">&#9654; Reanudar</button>
        <button id="restart-pause-btn" class="menu-btn">&#8634; Reiniciar</button>
        <details id="controls-detail">
          <summary class="menu-btn">&#9000; Ver controles</summary>
          <ul class="controls-list-overlay">
            <li><kbd>&#8592;</kbd><kbd>&#8594;</kbd> Mover</li>
            <li><kbd>&#8593;</kbd> / <kbd>X</kbd> Rotar</li>
            <li><kbd>&#8595;</kbd> Bajar</li>
            <li><kbd>Space</kbd> Drop duro</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> Pausa</li>
          </ul>
        </details>
        <div class="level-selector">
          <label for="start-level" class="menu-label">Nivel inicial</label>
          <select id="start-level">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
